---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: postgresql-v18
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: services
  name: postgresql-v18
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgresql-v18
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/part-of: services
  serviceName: headless-postgresql-v18
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgresql-v18
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/part-of: services
    spec:
      automountServiceAccountToken: false
      containers:
      - name: postgresql
        image: postgresql/postgresql-v18:latest
        args:
        - -c
        - config_file=/etc/postgresql/postgresql.conf
        envFrom:
        - secretRef:
            name: postgresql
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP
        resources:
          limits:
            cpu: 2000m
            memory: 8Gi
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: conf
          mountPath: /etc/postgresql
          readOnly: true
        - name: data
          mountPath: /var/lib/postgresql
      enableServiceLinks: false
      serviceAccountName: default
      volumes:
      - name: conf
        configMap:
          name: postgresql
          items:
          - key: postgresql.conf
            path: postgresql.conf
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 64Gi
      storageClassName: ceph-rbd
