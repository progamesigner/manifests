---
apiVersion: v1
kind: Service
metadata:
  name: headless-postgresql-v18
spec:
  clusterIP: None
  ports:
  - name: postgresql
    port: 5432
    protocol: TCP
    targetPort: postgresql
  selector:
    app.kubernetes.io/component: postgresql-v18
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: services
