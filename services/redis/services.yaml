---
apiVersion: v1
kind: Service
metadata:
  name: headless-redis-v8
spec:
  clusterIP: None
  ports:
  - name: redis
    port: 6379
    protocol: TCP
    targetPort: redis
  selector:
    app.kubernetes.io/component: redis-v8
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: services
