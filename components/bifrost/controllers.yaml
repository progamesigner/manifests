---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: bifrost
    app.kubernetes.io/name: bifrost
    app.kubernetes.io/part-of: components
  name: bifrost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: bifrost
      app.kubernetes.io/name: bifrost
      app.kubernetes.io/part-of: components
  template:
    metadata:
      labels:
        app.kubernetes.io/component: bifrost
        app.kubernetes.io/name: bifrost
        app.kubernetes.io/part-of: components
    spec:
      automountServiceAccountToken: true
      containers:
      - name: bifrost
        image: bifrost/bifrost:latest
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - name: conf
          mountPath: /app/data/config.json
          subPath: config.json
      enableServiceLinks: false
      serviceAccountName: default
      volumes:
      - name: conf
        configMap:
          name: bifrost
