---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: obsidian
    app.kubernetes.io/name: obsidian
    app.kubernetes.io/part-of: components
  name: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: obsidian
      app.kubernetes.io/name: obsidian
      app.kubernetes.io/part-of: components
  template:
    metadata:
      labels:
        app.kubernetes.io/component: obsidian
        app.kubernetes.io/name: obsidian
        app.kubernetes.io/part-of: components
    spec:
      automountServiceAccountToken: false
      containers:
      - name: obsidian
        image: obsidian/obsidian:latest
        env:
        - name: PGID
          value: '1000'
        - name: PUID
          value: '1000'
        envFrom:
        - configMapRef:
            name: obsidian
        - secretRef:
            name: obsidian
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 300m
            memory: 128Mi
        volumeMounts:
        - name: conf
          mountPath: /home/obsidian/.config
        - name: data
          mountPath: /vault
      - name: mcp
        image: mcp/muninn:latest
        env:
        - name: MUNINN_HTTP_ALLOWED_HOSTS
          valueFrom:
            secretKeyRef:
              name: obsidian
              key: MUNINN_HTTP_ALLOWED_HOSTS
        - name: MUNINN_HTTP_TOKENS_FILE
          value: /etc/muninn/tokens.json
        - name: MUNINN_RECALL_BACKEND
          value: tantivy
        ports:
        - name: mcp
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
        startupProbe:
          httpGet:
            path: /readyz
            port: 8000
          failureThreshold: 30
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 8Gi
          requests:
            cpu: 300m
            memory: 512Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /vault
        - name: cred
          mountPath: /etc/muninn/tokens.json
          subPath: tokens.json
          readOnly: true
      - name: webdav
        image: rclone/rclone:latest
        args:
        - serve
        - webdav
        - /vault
        - --addr=:8080
        ports:
        - name: webdav
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: data
          mountPath: /vault
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      serviceAccountName: default
      volumes:
      - name: conf
        persistentVolumeClaim:
          claimName: obsidian-config
      - name: cred
        secret:
          secretName: obsidian
      - name: data
        persistentVolumeClaim:
          claimName: obsidian
