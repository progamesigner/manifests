---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: obsidian
    app.kubernetes.io/name: obsidian
    app.kubernetes.io/part-of: components
  name: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: obsidian
      app.kubernetes.io/name: obsidian
      app.kubernetes.io/part-of: components
  template:
    metadata:
      labels:
        app.kubernetes.io/component: obsidian
        app.kubernetes.io/name: obsidian
        app.kubernetes.io/part-of: components
    spec:
      automountServiceAccountToken: false
      containers:
      - name: obsidian
        image: obsidian/obsidian:latest
        env:
        - name: PGID
          value: '1000'
        - name: PUID
          value: '1000'
        envFrom:
        - configMapRef:
            name: obsidian
        - secretRef:
            name: obsidian
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 300m
            memory: 128Mi
        volumeMounts:
        - name: conf
          mountPath: /home/obsidian/.config
        - name: data
          mountPath: /vault
      - name: mcp
        image: mcp/memory:latest
        env:
        - name: AGENTMEM_HTTP_ALLOWED_HOSTS
          value: '*'
        - name: AGENTMEM_RECALL_BACKEND
          value: tantivy
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 300m
            memory: 256Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /vault
      - name: webdav
        image: rclone/rclone:latest
        args:
        - serve
        - webdav
        - /vault
        - --addr=:8080
        ports:
        - name: webdav
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: data
          mountPath: /vault
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      serviceAccountName: default
      volumes:
      - name: conf
        persistentVolumeClaim:
          claimName: obsidian-config
      - name: data
        persistentVolumeClaim:
          claimName: obsidian
