---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: obsidian
    app.kubernetes.io/name: obsidian
    app.kubernetes.io/part-of: components
  name: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: obsidian
      app.kubernetes.io/name: obsidian
      app.kubernetes.io/part-of: components
  template:
    metadata:
      labels:
        app.kubernetes.io/component: obsidian
        app.kubernetes.io/name: obsidian
        app.kubernetes.io/part-of: components
    spec:
      automountServiceAccountToken: false
      containers:
      - name: obsidian
        image: obsidian/obsidian:latest
        env:
        - name: PGID
          value: '1000'
        - name: PUID
          value: '1000'
        envFrom:
        - configMapRef:
            name: obsidian
        - secretRef:
            name: obsidian
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 300m
            memory: 128Mi
        volumeMounts:
        - name: conf
          mountPath: /home/obsidian/.config
        - name: data
          mountPath: /vault
      - name: claude-code
        image: claude-code/claude-code:latest
        args:
        - claude
        - --channels
        - plugin:telegram@claude-plugins-official
        - --remote-control
        - --resume
        - claude-code
        command:
        - /bin/bash
        - -c
        - |
          set -e

          XDG_HOME_PATH=/home/ubuntu

          if [ -f $XDG_HOME_PATH/.claude/.claude.json ]; then
              ln -sf $XDG_HOME_PATH/.claude/.claude.json $XDG_HOME_PATH/.claude.json
          fi

          echo "Installing / Updating Claude Code..."
          curl -fsSL https://claude.ai/install.sh | bash

          echo "Installed Claude Code version: $(claude --version)"

          exec "$@"
        - --
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        stdin: true
        tty: true
        volumeMounts:
        - name: data
          mountPath: /workspace
          subPath: Agents/workspace
        - name: data-claude
          mountPath: /home/ubuntu/.claude
      - name: mcp
        image: mcp/memory:latest
        env:
        - name: AGENTMEM_HTTP_ALLOWED_HOSTS
          value: '*'
        - name: AGENTMEM_RECALL_BACKEND
          value: tantivy
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 300m
            memory: 128Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /vault
      - name: webdav
        image: rclone/rclone:latest
        args:
        - serve
        - webdav
        - /vault
        - --addr=:8080
        ports:
        - name: webdav
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: data
          mountPath: /vault
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      serviceAccountName: default
      volumes:
      - name: conf
        persistentVolumeClaim:
          claimName: obsidian-config
      - name: data
        persistentVolumeClaim:
          claimName: obsidian
      - name: data-claude
        persistentVolumeClaim:
          claimName: dev-data-claude
