---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: progamesigner@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cert-manager-cloudflare
            key: API_TOKEN
      selector:
        dnsZones:
        - progamesigner.com
        - progamesigner.dev
        - progamesigner.net
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: progamesigner-com
spec:
  commonName: progamesigner.com
  dnsNames:
  - progamesigner.com
  - '*.progamesigner.com'
  issuerRef:
    name: letsencrypt
  secretName: tls-com-progamesigner
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: progamesigner-dev
spec:
  commonName: progamesigner.dev
  dnsNames:
  - progamesigner.dev
  - '*.progamesigner.dev'
  issuerRef:
    name: letsencrypt
  secretName: tls-dev-progamesigner
